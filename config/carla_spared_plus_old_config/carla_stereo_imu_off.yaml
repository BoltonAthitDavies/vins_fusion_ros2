%YAML:1.0

# STEREO+IMU (imu:1) -- diverges on CARLA car motion (VI degeneracy); valid for richer-motion data.
imu: 1
num_of_cam: 2

imu_topic: "/carla/ego_vehicle/imu"
image0_topic: "/carla/ego_vehicle/cam_front_left/image"
image1_topic: "/carla/ego_vehicle/cam_front_right/image"
output_path: "output"

cam0_calib: "cam_front_left.yaml"
cam1_calib: "cam_front_right.yaml"
image_width: 960
image_height: 720

use_gpu: 0
use_gpu_acc_flow: 0
use_gpu_ceres: 0

# Standard CARLA rig: cameras at +/-0.25 m in body-y (0.5 m baseline). For the wide-baseline
# bag (17_41_28) change the y translations to -/+0.75.
estimate_extrinsic: 0
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 0, 0, 1,  1.5,
          -1, 0, 0, -0.25,
           0,-1, 0,  0,
           0, 0, 0,  1]
body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 0, 0, 1,  1.5,
          -1, 0, 0,  0.25,
           0,-1, 0,  0,
           0, 0, 0,  1]

multiple_thread: 1
max_cnt: 150
min_dist: 30
freq: 10
F_threshold: 1.0
show_track: 0
flow_back: 1

max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 10.0

acc_n: 0.001
gyr_n: 0.0001
acc_w: 0.0001
gyr_w: 0.00001
g_norm: 9.81

estimate_td: 1
td: 0.0

load_previous_pose_graph: 0
pose_graph_save_path: "output/pose_graph/"
save_image: 0

image_skip: 1
